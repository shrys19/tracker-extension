<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Website Tracker</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>⏱ Website Tracker</h1>
            <p>Track your browsing habits</p>
        </div>

        <div class="card">
            <div class="add-row">
                <input type="text" id="siteInput" placeholder="youtube.com">
                <button id="addBtn">
                    Add
                </button>
            </div>
        </div>

        <div class="card">
            <h2>Tracked Sites</h2>
            <ul id="siteList"></ul>
        </div>

        <div class="card">
            <h2>Time Spent</h2>
            <div id="stats"></div>
        </div>

        <button id="exportBtn" class="export">
            Export JSON Report
        </button>

        <button id="resetBtn" class="danger">
            Reset Data
        </button>

    </div>

    <script src="popup.js"></script>

</body>

</html>
