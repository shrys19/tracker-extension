<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Website Tracker</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>⏱ Website Tracker</h1>
            <p>Track your browsing habits</p>
        </div>

        <div class="card">
            <div class="add-row">
                <input type="text" id="siteInput" placeholder="youtube.com">
                <button id="addBtn">
                    Add
                </button>
            </div>
        </div>

        <div class="card">
            <h2>Tracked Sites</h2>
            <ul id="siteList"></ul>
        </div>

        <div class="card">
            <h2>Time Spent</h2>
            <div id="stats"></div>
        </div>

        <div class="card">
            <h2>Export JSON Report</h2>
            <div class="export-row">
                <button id="exportDayBtn" class="export">Today</button>
                <button id="exportWeekBtn" class="export">This Week</button>
                <button id="exportMonthBtn" class="export">This Month</button>
                <button id="exportBtn" class="export">All Time</button>
            </div>
        </div>

        <button id="resetBtn" class="danger">
            Reset Data
        </button>

    </div>

    <script src="popup.js"></script>

</body>

</html>
